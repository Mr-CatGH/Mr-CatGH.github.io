<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter Page</title>
</head>
<body>
    <h1>Visitor Counter</h1>
    <p>Counter: <span id="counter">Loading...</span></p>
    <button id="incrementBtn">Click Me!</button>

    <script>
        // Function to update counter on page
        async function updateCounter() {
            const response = await fetch('/increment');
            const data = await response.json();
            document.getElementById('counter').textContent = data.counter;
        }

        // Load current counter on page load
        fetch('/get-counter')
            .then(res => res.json())
            .then(data => document.getElementById('counter').textContent = data.counter);

        document.getElementById('incrementBtn').addEventListener('click', updateCounter);
    </script>
</body>
</html>
